<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper Gallery</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
  </head>
  <body>
    <header id="nav-holder">
      <nav class="navbar">
        <div class="nav-container">
          <div class="logo">Pin<span>terest</span></div>
        </div>
      </nav>
    </header>

    <main class="container">
      <h1 class="page-title">All Pins</h1>

      <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-item">
          <div class="image-container">
            <img src="https://picsum.photos/id/101/800/450" alt="Wallpaper" />
          </div>

          <div class="card-content">
            <h3 class="card-title">Midnight Mountain High</h3>

            <div class="card-footer">
              <span class="user-name">Jayani Anuththara</span>
            </div>
          </div>
        </div>

        <div class="gallery-item">
          <div class="image-container">
            <img src="https://picsum.photos/id/101/800/450" alt="Wallpaper" />
          </div>

          <div class="card-content">
            <h3 class="card-title">Midnight Mountain High</h3>

            <div class="card-footer">
              <span class="user-name">Adithya Shenal</span>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 WallpaperHub. Built with Vanilla JS.</p>
        <div class="footer-links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/main.js"></script>
  </body>
</html>
